plugins {
  id 'com.android.library'
  id 'org.jetbrains.kotlin.android'
}

buildDir = new File(rootProject.buildDir, "modules-ir-android")

android {
  namespace 'com.ledblink.ir'
  compileSdk 36

  defaultConfig {
    minSdk 24
    targetSdk 36
    consumerProguardFiles 'consumer-rules.pro'
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = '17'
  }
}

dependencies {
  implementation project(':expo-modules-core')
  implementation 'com.facebook.react:react-android'
}

afterEvaluate {
  tasks.matching { it.name == 'copyReleaseJniLibsProjectOnly' }.configureEach {
    mustRunAfter(":ir:mergeReleaseNativeLibs")
  }
  tasks.matching { it.name == 'copyDebugJniLibsProjectOnly' }.configureEach {
    mustRunAfter(":ir:mergeDebugNativeLibs")
  }
}
